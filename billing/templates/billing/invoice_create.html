{% extends 'billing/base.html' %}

{% block content %}
<h1>Créer une facture</h1>

{% if error %}
  <p class="error">{{ error }}</p>
{% endif %}

<form method="post">
  {% csrf_token %}

  <table>
    <thead>
      <tr>
        <th>Produit</th>
        <th>Prix</th>
        <th>Quantité</th>
      </tr>
    </thead>
    <tbody>
      {% for product in products %}
        <tr>
          <td>{{ product.name }}</td>
          <td>{{ product.price }}</td>
          <td>
            <input type="number" min="0" name="product_{{ product.id }}" value="0">
          </td>
        </tr>
      {% empty %}
        <tr><td colspan="3">Aucun produit disponible.</td></tr>
      {% endfor %}
    </tbody>
  </table>

  <button type="submit" {% if not products %}disabled{% endif %}>Créer la facture</button>
</form>
{% endblock %}
